<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        
        <h1>Save Our Wildlife</h1>

        
        <div class="video-wrapper">
            <video id="wildlifeVideo" controls aria-label="Promotional video about wildlife conservation">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        
        <p class="description">
            Join us in protecting endangered species and their natural habitats. 
            Every action counts – watch this video to see how you can make a difference.
        </p>

        
        <button id="toggleBtn" aria-label="Toggle video play or hide">Play / Hide Video</button>
    </main>

    
    <script src="script.js"></script>
</body>
</html>
